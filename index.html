<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N5 日語自主學習系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel Compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 安全 Fetch 封裝：當單一 JSON 讀取失敗時，紀錄 Warning 並回傳 null，避免阻塞系統
    const fetchJsonSafe = async (url) => {
      try {
        const res = await fetch(url);
        if (!res.ok) {
          console.warn(`[Data Fetch] 檔案讀取失敗 (${res.status}): ${url}`);
          return null;
        }
        return await res.json();
      } catch (err) {
        console.warn(`[Data Fetch] 網路或解析錯誤: ${url}`, err);
        return null;
      }
    };

    function App() {
      const [loading, setLoading] = useState(true);
      const [dataError, setDataError] = useState(null);

      // 4 大資料集 State
      const [wordsData, setWordsData] = useState([]);
      const [glossaryData, setGlossaryData] = useState([]);
      const [kanaData, setKanaData] = useState(null);
      const [kanjiData, setKanjiData] = useState([]);

      // UI 介面 State
      const [activeTab, setActiveTab] = useState("kanji"); // 'kanji' | 'words' | 'kana'
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedKanji, setSelectedKanji] = useState(null);

      // 非同步平行載入 data/*.json
      const loadAllData = async () => {
        setLoading(true);
        setDataError(null);

        const [words, glossary, kana, kanji] = await Promise.all([
          fetchJsonSafe("./data/words.json"),
          fetchJsonSafe("./data/glossary.json"),
          fetchJsonSafe("./data/kana.json"),
          fetchJsonSafe("./data/kanji.json")
        ]);

        // 只有當所有基礎檔案都無法獲取時，才判定為重大載入失敗
        if (!words && !kana && !kanji) {
          setDataError("無法讀取 ./data/ 目錄下的 JSON 檔案。請確認 Workers 靜態資源配置或檔案路徑。");
          setLoading(false);
          return;
        }

        // 容錯寫入：若特定 JSON 尚未發布，自動以空陣列/物件替代
        setWordsData(words || []);
        setGlossaryData(glossary || []);
        setKanaData(kana);
        setKanjiData(kanji || []);

        setLoading(false);
      };

      useEffect(() => {
        loadAllData();
      }, []);

      // 漢字搜尋過濾邏輯
      const filteredKanji = useMemo(() => {
        if (!searchQuery.trim()) return kanjiData;
        const q = searchQuery.toLowerCase().trim();
        return kanjiData.filter(item => 
          (item.kanji && item.kanji.includes(q)) ||
          (item.meaning && item.meaning.includes(q)) ||
          (item.onyomi && item.onyomi.some(o => o.includes(q))) ||
          (item.kunyomi && item.kunyomi.some(k => k.includes(q)))
        );
      }, [kanjiData, searchQuery]);

      // 載入中動畫
      if (loading) {
        return (
          <div class="flex flex-col items-center justify-center min-h-screen">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
            <p class="text-slate-600 font-medium">正在載入日語 N5 學習資料庫...</p>
          </div>
        );
      }

      // 重大錯誤提示（僅在完全讀不到資料時觸發）
      if (dataError) {
        return (
          <div class="flex flex-col items-center justify-center min-h-screen p-4">
            <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r shadow-md max-w-lg w-full">
              <div class="flex items-center mb-3 text-red-700 font-bold text-lg">
                <i class="fa-solid fa-triangle-exclamation text-xl me-2"></i>
                資料讀取錯誤
              </div>
              <p class="text-sm text-red-600 mb-4">{dataError}</p>
              <p class="text-xs text-slate-500 mb-4">
                請確認 Cloudflare Worker / Pages 專案的 <code>./data/</code> 目錄下包含：
                <br />• words.json <br />• glossary.json <br />• kana.json <br />• kanji.json
              </p>
              <button 
                onClick={loadAllData}
                class="w-full py-2 bg-red-600 text-white font-semibold rounded hover:bg-red-700 transition"
              >
                重新載入
              </button>
            </div>
          </div>
        );
      }

      return (
        <div class="max-w-6xl mx-auto px-4 py-8">
          {/* Header 頂部導覽 */}
          <header class="mb-8 border-b pb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
              <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                <i class="fa-solid fa-torii-gate text-indigo-600"></i>
                N5 日語自主學習系統
              </h1>
              <p class="text-slate-500 text-sm mt-1">獨立字庫與模組化獨立架構</p>
            </div>

            <nav class="flex gap-2 bg-slate-200/60 p-1.5 rounded-xl self-start md:self-auto">
              <button
                onClick={() => setActiveTab("kanji")}
                class={`px-4 py-2 rounded-lg font-medium text-sm transition ${
                  activeTab === "kanji"
                    ? "bg-white text-indigo-600 shadow-sm"
                    : "text-slate-600 hover:text-slate-900"
                }`}
              >
                <i class="fa-solid fa-font me-1.5"></i>漢字庫 ({kanjiData.length})
              </button>
              <button
                onClick={() => setActiveTab("words")}
                class={`px-4 py-2 rounded-lg font-medium text-sm transition ${
                  activeTab === "words"
                    ? "bg-white text-indigo-600 shadow-sm"
                    : "text-slate-600 hover:text-slate-900"
                }`}
              >
                <i class="fa-solid fa-book-bookmark me-1.5"></i>核心單字 ({wordsData.length})
              </button>
              <button
                onClick={() => setActiveTab("kana")}
                class={`px-4 py-2 rounded-lg font-medium text-sm transition ${
                  activeTab === "kana"
                    ? "bg-white text-indigo-600 shadow-sm"
                    : "text-slate-600 hover:text-slate-900"
                }`}
              >
                <i class="fa-solid fa-language me-1.5"></i>五十音圖
              </button>
            </nav>
          </header>

          {/* TAB 1: 漢字庫 */}
          {activeTab === "kanji" && (
            <section class="space-y-6">
              <div class="relative max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input
                  type="text"
                  placeholder="搜尋漢字、音讀 (片假名)、訓讀 (平假名) 或釋義..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-sm text-sm"
                />
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {filteredKanji.map((item) => (
                  <div
                    key={item.kanji}
                    onClick={() => setSelectedKanji(item)}
                    class="bg-white rounded-xl border border-slate-200 p-5 hover:border-indigo-400 hover:shadow-md transition cursor-pointer flex flex-col justify-between"
                  >
                    <div>
                      <div class="flex items-start justify-between">
                        <span class="text-4xl font-extrabold text-slate-800 bg-slate-100 w-14 h-14 rounded-lg flex items-center justify-center">
                          {item.kanji}
                        </span>
                        <span class="text-xs px-2.5 py-1 bg-indigo-50 text-indigo-700 font-semibold rounded-full border border-indigo-100">
                          {item.strokes} 畫
                        </span>
                      </div>
                      <div class="mt-4 space-y-1.5 text-xs">
                        <div class="flex items-center gap-2">
                          <span class="text-slate-400 font-medium w-10">音讀</span>
                          <span class="text-slate-700 font-mono bg-slate-50 px-1.5 py-0.5 rounded">
                            {item.onyomi && item.onyomi.length > 0 ? item.onyomi.join("、") : "—"}
                          </span>
                        </div>
                        <div class="flex items-center gap-2">
                          <span class="text-slate-400 font-medium w-10">訓讀</span>
                          <span class="text-slate-700 font-mono bg-slate-50 px-1.5 py-0.5 rounded">
                            {item.kunyomi && item.kunyomi.length > 0 ? item.kunyomi.join("、") : "—"}
                          </span>
                        </div>
                      </div>
                    </div>

                    <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between text-xs">
                      <span class="text-slate-600 font-medium truncate">{item.meaning}</span>
                      <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </div>
                  </div>
                ))}
              </div>

              {filteredKanji.length === 0 && (
                <div class="text-center py-12 text-slate-400 bg-white rounded-xl border border-dashed">
                  <i class="fa-regular fa-folder-open text-3xl mb-2 block"></i>
                  <p>{kanjiData.length === 0 ? "尚未讀取到 kanji.json 資料，請確認部署狀態。" : "未找到符合條件的漢字"}</p>
                </div>
              )}
            </section>
          )}

          {/* TAB 2: 核心單字 */}
          {activeTab === "words" && (
            <section class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <h2 class="text-lg font-bold text-slate-800 mb-4">N5 核心單字列表</h2>
              {wordsData.length > 0 ? (
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse text-sm">
                    <thead>
                      <tr class="border-b border-slate-200 bg-slate-50 text-slate-500 font-semibold">
                        <th class="p-3">單字 (漢字)</th>
                        <th class="p-3">假名標記</th>
                        <th class="p-3">中文釋義</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                      {wordsData.map((w, index) => (
                        <tr key={index} class="hover:bg-slate-50/80 transition">
                          <td class="p-3 font-medium text-slate-800 text-base">{w.kanji || w.word}</td>
                          <td class="p-3 text-indigo-600 font-mono">{w.kana || w.reading}</td>
                          <td class="p-3 text-slate-600">{w.meaning || w.translation}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <p class="text-slate-500 text-sm">未讀取到 words.json 資料。</p>
              )}
            </section>
          )}

          {/* TAB 3: 五十音 */}
          {activeTab === "kana" && (
            <section class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <h2 class="text-lg font-bold text-slate-800 mb-4">五十音基礎對照表</h2>
              {kanaData ? (
                <div class="grid grid-cols-5 sm:grid-cols-10 gap-2">
                  {Object.entries(kanaData.hiraganaSeion || {}).map(([romaji, kana]) => (
                    <div key={romaji} class="bg-slate-50 border rounded-lg p-3 text-center">
                      <div class="text-2xl font-bold text-slate-800">{kana}</div>
                      <div class="text-xs text-slate-400 font-mono mt-1">{romaji}</div>
                    </div>
                  ))}
                </div>
              ) : (
                <p class="text-slate-500 text-sm">未讀取到 kana.json 資料。</p>
              )}
            </section>
          )}

          {/* 漢字詳情彈窗 */}
          {selectedKanji && (
            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl relative animate-in fade-in zoom-in-95 duration-150">
                <button
                  onClick={() => setSelectedKanji(null)}
                  class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 w-8 h-8 rounded-full flex items-center justify-center"
                >
                  <i class="fa-solid fa-xmark text-lg"></i>
                </button>

                <div class="flex items-center gap-4 mb-6">
                  <div class="text-6xl font-black text-slate-900 bg-indigo-50 border border-indigo-100 rounded-2xl w-24 h-24 flex items-center justify-center shadow-inner">
                    {selectedKanji.kanji}
                  </div>
                  <div>
                    <span class="text-xs px-2.5 py-1 bg-slate-100 text-slate-600 font-semibold rounded-md">
                      筆劃：{selectedKanji.strokes} 畫
                    </span>
                    <h3 class="text-xl font-bold text-slate-800 mt-2">{selectedKanji.meaning}</h3>
                    <p class="text-xs text-indigo-600 font-medium">難度分級：{selectedKanji.grade || "N5"}</p>
                  </div>
                </div>

                <div class="space-y-3 bg-slate-50 p-4 rounded-xl mb-6">
                  <div>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">音讀 (Onyomi)</span>
                    <div class="flex flex-wrap gap-1.5">
                      {selectedKanji.onyomi && selectedKanji.onyomi.length > 0 ? (
                        selectedKanji.onyomi.map(o => (
                          <span key={o} class="bg-indigo-600 text-white text-xs font-mono px-2 py-0.5 rounded">{o}</span>
                        ))
                      ) : <span class="text-xs text-slate-400">—</span>}
                    </div>
                  </div>
                  <div class="pt-2 border-t border-slate-200/60">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">訓讀 (Kunyomi)</span>
                    <div class="flex flex-wrap gap-1.5">
                      {selectedKanji.kunyomi && selectedKanji.kunyomi.length > 0 ? (
                        selectedKanji.kunyomi.map(k => (
                          <span key={k} class="bg-emerald-600 text-white text-xs font-mono px-2 py-0.5 rounded">{k}</span>
                        ))
                      ) : <span class="text-xs text-slate-400">—</span>}
                    </div>
                  </div>
                </div>

                {selectedKanji.related_words && selectedKanji.related_words.length > 0 && (
                  <div>
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">相關詞彙聯動</h4>
                    <div class="flex flex-wrap gap-2">
                      {selectedKanji.related_words.map((rw, i) => (
                        <span key={i} class="bg-slate-100 border border-slate-200 text-slate-700 text-xs px-2.5 py-1 rounded-lg">
                          {rw}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
