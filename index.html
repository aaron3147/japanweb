<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日語自主學習系統 (N5 / N4)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel Compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 安全 Fetch 封裝
    const fetchJsonSafe = async (url) => {
      try {
        const res = await fetch(url);
        if (!res.ok) {
          console.warn(`[Data Fetch] 檔案讀取失敗 (${res.status}): ${url}`);
          return null;
        }
        return await res.json();
      } catch (err) {
        console.warn(`[Data Fetch] 網路或解析錯誤: ${url}`, err);
        return null;
      }
    };

    function App() {
      const [loading, setLoading] = useState(true);
      const [dataError, setDataError] = useState(null);

      // 4 大資料集 State
      const [wordsData, setWordsData] = useState([]);
      const [glossaryData, setGlossaryData] = useState([]);
      const [kanaData, setKanaData] = useState(null);
      const [kanjiData, setKanjiData] = useState([]);

      // UI 與過濾器 State
      const [activeTab, setActiveTab] = useState("kanji"); // 'kanji' | 'words' | 'kana' | 'quiz'
      const [levelFilter, setLevelFilter] = useState("ALL"); // 'ALL' | 'N5' | 'N4'
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedKanji, setSelectedKanji] = useState(null);

      // 測驗系統 State
      const [quizCategory, setQuizCategory] = useState("kanji"); // 'kanji' | 'words'
      const [kanjiQuizMode, setKanjiQuizMode] = useState("meaning"); // 'meaning' (釋義) | 'reading' (讀音)
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [quizOptions, setQuizOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [quizScore, setQuizScore] = useState({ correct: 0, total: 0 });

      // 非同步平行載入 data/*.json
      const loadAllData = async () => {
        setLoading(true);
        setDataError(null);

        const [words, glossary, kana, kanji] = await Promise.all([
          fetchJsonSafe("./data/words.json"),
          fetchJsonSafe("./data/glossary.json"),
          fetchJsonSafe("./data/kana.json"),
          fetchJsonSafe("./data/kanji.json")
        ]);

        if (!words && !kana && !kanji) {
          setDataError("無法讀取 ./data/ 目錄下的 JSON 檔案。請確認 Cloudflare Workers 靜態資源配置或檔案路徑。");
          setLoading(false);
          return;
        }

        setWordsData(words || []);
        setGlossaryData(glossary || []);
        setKanaData(kana);
        setKanjiData(kanji || []);
        setLoading(false);
      };

      useEffect(() => {
        loadAllData();
      }, []);

      // 按級別過濾後的資料
      const filteredWords = useMemo(() => {
        return wordsData.filter(item => {
          const matchLevel = levelFilter === "ALL" || (item.grade || item.level || "N5") === levelFilter;
          const matchQuery = !searchQuery.trim() || 
            (item.kanji || item.word || "").includes(searchQuery) ||
            (item.kana || item.reading || "").includes(searchQuery) ||
            (item.meaning || item.translation || "").includes(searchQuery);
          return matchLevel && matchQuery;
        });
      }, [wordsData, levelFilter, searchQuery]);

      const filteredKanji = useMemo(() => {
        return kanjiData.filter(item => {
          const matchLevel = levelFilter === "ALL" || (item.grade || item.level || "N5") === levelFilter;
          const q = searchQuery.toLowerCase().trim();
          const matchQuery = !q ||
            (item.kanji && item.kanji.includes(q)) ||
            (item.meaning && item.meaning.includes(q)) ||
            (item.onyomi && item.onyomi.some(o => o.includes(q))) ||
            (item.kunyomi && item.kunyomi.some(k => k.includes(q)));
          return matchLevel && matchQuery;
        });
      }, [kanjiData, levelFilter, searchQuery]);

      // 取得漢字的顯示選項標籤 (釋義或讀音)
      const getOptionText = (item) => {
        if (!item) return "";
        if (quizCategory === "words") {
          return `${item.meaning || item.translation} (${item.kana || item.reading})`;
        }
        if (kanjiQuizMode === "meaning") {
          return item.meaning;
        } else {
          // 讀音模式：組合音讀與訓讀
          const ony = (item.onyomi && item.onyomi.length) ? item.onyomi.join("、") : "無音讀";
          const kun = (item.kunyomi && item.kunyomi.length) ? item.kunyomi.join("、") : "無訓讀";
          return `音：${ony} | 訓：${kun}`;
        }
      };

      // 測驗題目生成器
      const generateQuizQuestion = () => {
        const pool = quizCategory === "kanji" ? filteredKanji : filteredWords;
        if (!pool || pool.length < 4) return;

        const targetIndex = Math.floor(Math.random() * pool.length);
        const target = pool[targetIndex];

        // 隨機抽選 3 個錯誤選項
        const wrongPool = pool.filter((_, idx) => idx !== targetIndex);
        const shuffledWrong = wrongPool.sort(() => 0.5 - Math.random()).slice(0, 3);

        const options = [target, ...shuffledWrong].sort(() => 0.5 - Math.random());

        setCurrentQuestion(target);
        setQuizOptions(options);
        setSelectedOption(null);
      };

      useEffect(() => {
        if (activeTab === "quiz") {
          generateQuizQuestion();
        }
      }, [activeTab, quizCategory, kanjiQuizMode, levelFilter]);

      const handleOptionSelect = (option) => {
        if (selectedOption !== null) return;
        setSelectedOption(option);
        const isCorrect = option === currentQuestion;
        setQuizScore(prev => ({
          correct: isCorrect ? prev.correct + 1 : prev.correct,
          total: prev.total + 1
        }));
      };

      // 50音解析器 (多格式防呆相容)
      const parsedKanaList = useMemo(() => {
        if (!kanaData) return [];
        let list = [];

        if (kanaData.hiraganaSeion) {
          list = Object.entries(kanaData.hiraganaSeion).map(([romaji, hira]) => ({
            romaji,
            hiragana: hira,
            katakana: kanaData.katakanaSeion ? kanaData.katakanaSeion[romaji] : ""
          }));
        } else if (Array.isArray(kanaData)) {
          list = kanaData;
        } else if (typeof kanaData === "object") {
          list = Object.entries(kanaData).map(([k, v]) => {
            if (typeof v === "object") {
              return { romaji: k, hiragana: v.hiragana || v.kana || "", katakana: v.katakana || "" };
            }
            return { romaji: k, hiragana: v, katakana: "" };
          });
        }
        return list;
      }, [kanaData]);

      if (loading) {
        return (
          <div class="flex flex-col items-center justify-center min-h-screen">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
            <p class="text-slate-600 font-medium">正在載入日語學習資料庫...</p>
          </div>
        );
      }

      if (dataError) {
        return (
          <div class="flex flex-col items-center justify-center min-h-screen p-4">
            <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r shadow-md max-w-lg w-full">
              <div class="flex items-center mb-3 text-red-700 font-bold text-lg">
                <i class="fa-solid fa-triangle-exclamation text-xl me-2"></i>
                資料讀取錯誤
              </div>
              <p class="text-sm text-red-600 mb-4">{dataError}</p>
              <button 
                onClick={loadAllData}
                class="w-full py-2 bg-red-600 text-white font-semibold rounded hover:bg-red-700 transition"
              >
                重新載入
              </button>
            </div>
          </div>
        );
      }

      return (
        <div class="max-w-6xl mx-auto px-4 py-8">
          {/* Header 與頂部控制區 */}
          <header class="mb-8 border-b pb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
              <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                <i class="fa-solid fa-torii-gate text-indigo-600"></i>
                日語自主學習系統
              </h1>
              <p class="text-slate-500 text-sm mt-1">獨立字庫與模組化獨立架構 (N5 / N4)</p>
            </div>

            <div class="flex flex-wrap items-center gap-3">
              {/* N4 / N5 分級篩選器 */}
              <div class="flex items-center bg-slate-200/80 p-1 rounded-xl text-xs font-bold">
                <button
                  onClick={() => setLevelFilter("ALL")}
                  class={`px-3 py-1.5 rounded-lg transition ${levelFilter === "ALL" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  全部級別
                </button>
                <button
                  onClick={() => setLevelFilter("N5")}
                  class={`px-3 py-1.5 rounded-lg transition ${levelFilter === "N5" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  N5
                </button>
                <button
                  onClick={() => setLevelFilter("N4")}
                  class={`px-3 py-1.5 rounded-lg transition ${levelFilter === "N4" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  N4
                </button>
              </div>

              {/* 導覽 Tab */}
              <nav class="flex gap-1 bg-slate-200/80 p-1 rounded-xl">
                <button
                  onClick={() => setActiveTab("kanji")}
                  class={`px-3.5 py-1.5 rounded-lg font-medium text-sm transition ${activeTab === "kanji" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  <i class="fa-solid fa-font me-1"></i>漢字 ({filteredKanji.length})
                </button>
                <button
                  onClick={() => setActiveTab("words")}
                  class={`px-3.5 py-1.5 rounded-lg font-medium text-sm transition ${activeTab === "words" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  <i class="fa-solid fa-book-bookmark me-1"></i>單字 ({filteredWords.length})
                </button>
                <button
                  onClick={() => setActiveTab("kana")}
                  class={`px-3.5 py-1.5 rounded-lg font-medium text-sm transition ${activeTab === "kana" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600"}`}
                >
                  <i class="fa-solid fa-language me-1"></i>五十音
                </button>
                <button
                  onClick={() => setActiveTab("quiz")}
                  class={`px-3.5 py-1.5 rounded-lg font-medium text-sm transition ${activeTab === "quiz" ? "bg-indigo-600 text-white shadow-sm" : "text-slate-600 hover:text-slate-900"}`}
                >
                  <i class="fa-solid fa-pen-to-square me-1"></i>測驗功能
                </button>
              </nav>
            </div>
          </header>

          {/* TAB 1: 漢字庫 */}
          {activeTab === "kanji" && (
            <section class="space-y-6">
              <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div class="relative max-w-md w-full">
                  <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input
                    type="text"
                    placeholder="搜尋漢字、音讀 (片假名)、訓讀 (平假名) 或釋義..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-sm text-sm"
                  />
                </div>

                {/* 快捷發起漢字測驗 */}
                <button
                  onClick={() => {
                    setQuizCategory("kanji");
                    setActiveTab("quiz");
                  }}
                  class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-sm text-sm flex items-center justify-center gap-2 transition"
                >
                  <i class="fa-solid fa-vial-circle-check"></i>
                  開始漢字測驗 ({filteredKanji.length} 題庫)
                </button>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {filteredKanji.map((item) => (
                  <div
                    key={item.kanji}
                    onClick={() => setSelectedKanji(item)}
                    class="bg-white rounded-xl border border-slate-200 p-5 hover:border-indigo-400 hover:shadow-md transition cursor-pointer flex flex-col justify-between"
                  >
                    <div>
                      <div class="flex items-start justify-between">
                        <span class="text-4xl font-extrabold text-slate-800 bg-slate-100 w-14 h-14 rounded-lg flex items-center justify-center">
                          {item.kanji}
                        </span>
                        <div class="flex flex-col items-end gap-1">
                          <span class="text-xs px-2 py-0.5 bg-slate-100 text-slate-600 font-bold rounded">
                            {item.grade || item.level || "N5"}
                          </span>
                          <span class="text-xs px-2 py-0.5 bg-indigo-50 text-indigo-700 font-semibold rounded-full border border-indigo-100">
                            {item.strokes} 畫
                          </span>
                        </div>
                      </div>
                      <div class="mt-4 space-y-1.5 text-xs">
                        <div class="flex items-center gap-2">
                          <span class="text-slate-400 font-medium w-10">音讀</span>
                          <span class="text-slate-700 font-mono bg-slate-50 px-1.5 py-0.5 rounded truncate">
                            {item.onyomi && item.onyomi.length > 0 ? item.onyomi.join("、") : "—"}
                          </span>
                        </div>
                        <div class="flex items-center gap-2">
                          <span class="text-slate-400 font-medium w-10">訓讀</span>
                          <span class="text-slate-700 font-mono bg-slate-50 px-1.5 py-0.5 rounded truncate">
                            {item.kunyomi && item.kunyomi.length > 0 ? item.kunyomi.join("、") : "—"}
                          </span>
                        </div>
                      </div>
                    </div>

                    <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between text-xs">
                      <span class="text-slate-600 font-medium truncate">{item.meaning}</span>
                      <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* TAB 2: 單字庫 */}
          {activeTab === "words" && (
            <section class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-800">核心單字列表 ({filteredWords.length})</h2>
                <input
                  type="text"
                  placeholder="搜尋單字、假名或中文..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  class="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs w-64 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                />
              </div>

              <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                  <thead>
                    <tr class="border-b border-slate-200 bg-slate-50 text-slate-500 font-semibold">
                      <th class="p-3">單字 (漢字)</th>
                      <th class="p-3">假名標記</th>
                      <th class="p-3">中文釋義</th>
                      <th class="p-3">分級</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100">
                    {filteredWords.map((w, index) => (
                      <tr key={index} class="hover:bg-slate-50/80 transition">
                        <td class="p-3 font-medium text-slate-800 text-base">{w.kanji || w.word}</td>
                        <td class="p-3 text-indigo-600 font-mono">{w.kana || w.reading}</td>
                        <td class="p-3 text-slate-600">{w.meaning || w.translation}</td>
                        <td class="p-3">
                          <span class="text-xs px-2 py-0.5 bg-slate-100 text-slate-600 font-bold rounded">
                            {w.grade || w.level || "N5"}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>
          )}

          {/* TAB 3: 五十音對照表 */}
          {activeTab === "kana" && (
            <section class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
              <h2 class="text-lg font-bold text-slate-800 mb-4">五十音對照表 ({parsedKanaList.length} 音)</h2>
              {parsedKanaList.length > 0 ? (
                <div class="grid grid-cols-5 sm:grid-cols-10 gap-2">
                  {parsedKanaList.map((item, idx) => (
                    <div key={idx} class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-center hover:bg-indigo-50/50 transition">
                      <div class="text-2xl font-bold text-slate-800">{item.hiragana}</div>
                      {item.katakana && <div class="text-xs text-indigo-600 font-medium">{item.katakana}</div>}
                      <div class="text-xs text-slate-400 font-mono mt-1">{item.romaji}</div>
                    </div>
                  ))}
                </div>
              ) : (
                <p class="text-slate-500 text-sm">未讀取到 kana.json 或資料格式尚不相容。</p>
              )}
            </section>
          )}

          {/* TAB 4: 測驗功能 (包含漢字與單字) */}
          {activeTab === "quiz" && (
            <section class="max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 p-6 md:p-8 shadow-sm">
              {/* 測驗類別選擇 */}
              <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-4 mb-6 gap-4">
                <div class="flex items-center gap-2">
                  <button
                    onClick={() => setQuizCategory("kanji")}
                    class={`px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1.5 ${quizCategory === "kanji" ? "bg-indigo-600 text-white shadow-sm" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}
                  >
                    <i class="fa-solid fa-font"></i> 漢字測驗
                  </button>
                  <button
                    onClick={() => setQuizCategory("words")}
                    class={`px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1.5 ${quizCategory === "words" ? "bg-indigo-600 text-white shadow-sm" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}
                  >
                    <i class="fa-solid fa-book-bookmark"></i> 單字測驗
                  </button>
                </div>

                {/* 漢字測驗專屬模式：釋義 vs 讀音 */}
                {quizCategory === "kanji" && (
                  <div class="flex items-center bg-slate-100 p-1 rounded-lg text-xs font-semibold">
                    <button
                      onClick={() => setKanjiQuizMode("meaning")}
                      class={`px-3 py-1 rounded-md transition ${kanjiQuizMode === "meaning" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-500"}`}
                    >
                      釋義題
                    </button>
                    <button
                      onClick={() => setKanjiQuizMode("reading")}
                      class={`px-3 py-1 rounded-md transition ${kanjiQuizMode === "reading" ? "bg-white text-indigo-600 shadow-sm" : "text-slate-500"}`}
                    >
                      讀音題 (音/訓)
                    </button>
                  </div>
                )}

                <div class="text-xs font-semibold text-slate-500 self-end sm:self-auto">
                  答對得分：<span class="text-indigo-600 font-bold text-base">{quizScore.correct}</span> / {quizScore.total}
                </div>
              </div>

              {/* 題目卡片 */}
              {currentQuestion ? (
                <div class="space-y-6">
                  <div class="text-center py-8 bg-slate-50 rounded-2xl border border-slate-100">
                    <span class="text-xs px-3 py-1 bg-indigo-100 text-indigo-700 font-bold rounded-full mb-2 inline-block">
                      {levelFilter} 級別 • {quizCategory === "kanji" ? (kanjiQuizMode === "meaning" ? "漢字釋義測驗" : "漢字讀音測驗") : "單字測驗"}
                    </span>

                    {/* 題目主體：漢字或單字 */}
                    <h3 class="text-6xl font-black text-slate-900 mt-2 tracking-wide">
                      {quizCategory === "kanji" ? currentQuestion.kanji : (currentQuestion.kanji || currentQuestion.word)}
                    </h3>

                    <p class="text-slate-500 text-xs mt-3 font-medium">
                      {quizCategory === "kanji" 
                        ? (kanjiQuizMode === "meaning" ? "請選擇該漢字正確的中文釋義" : "請選擇該漢字正確的【音讀與訓讀】組合")
                        : `假名提示：${currentQuestion.kana || currentQuestion.reading || "無"}`
                      }
                    </p>
                  </div>

                  {/* 四選一選項 */}
                  <div class="grid grid-cols-1 gap-3">
                    {quizOptions.map((opt, i) => {
                      const isSelected = selectedOption === opt;
                      const isCorrect = opt === currentQuestion;
                      
                      let btnStyle = "bg-white border-slate-200 text-slate-700 hover:border-indigo-400 hover:bg-slate-50/50";
                      if (selectedOption !== null) {
                        if (isCorrect) btnStyle = "bg-emerald-500 border-emerald-500 text-white font-bold shadow-md";
                        else if (isSelected) btnStyle = "bg-red-500 border-red-500 text-white shadow-md";
                        else btnStyle = "bg-slate-50 border-slate-100 text-slate-400 opacity-60";
                      }

                      return (
                        <button
                          key={i}
                          disabled={selectedOption !== null}
                          onClick={() => handleOptionSelect(opt)}
                          class={`p-4 border rounded-xl text-left transition flex items-center justify-between text-sm ${btnStyle}`}
                        >
                          <span class="font-medium">
                            {getOptionText(opt)}
                          </span>
                          {selectedOption !== null && isCorrect && <i class="fa-solid fa-circle-check text-lg"></i>}
                          {selectedOption !== null && isSelected && !isCorrect && <i class="fa-solid fa-circle-xmark text-lg"></i>}
                        </button>
                      );
                    })}
                  </div>

                  {/* 下一題按鈕 */}
                  {selectedOption !== null && (
                    <button
                      onClick={generateQuizQuestion}
                      class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition flex items-center justify-center gap-2"
                    >
                      下一題 <i class="fa-solid fa-arrow-right"></i>
                    </button>
                  )}
                </div>
              ) : (
                <div class="text-center py-12 text-slate-400">
                  <i class="fa-solid fa-folder-open text-3xl mb-2 block"></i>
                  <p>當前級別（{levelFilter}）無足夠資料產生測驗題庫，請切換至「全部級別」。</p>
                </div>
              )}
            </section>
          )}

          {/* 漢字詳情彈窗 */}
          {selectedKanji && (
            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl relative">
                <button
                  onClick={() => setSelectedKanji(null)}
                  class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 w-8 h-8 rounded-full flex items-center justify-center"
                >
                  <i class="fa-solid fa-xmark text-lg"></i>
                </button>

                <div class="flex items-center gap-4 mb-6">
                  <div class="text-6xl font-black text-slate-900 bg-indigo-50 border border-indigo-100 rounded-2xl w-24 h-24 flex items-center justify-center shadow-inner">
                    {selectedKanji.kanji}
                  </div>
                  <div>
                    <span class="text-xs px-2.5 py-1 bg-slate-100 text-slate-600 font-semibold rounded-md">
                      筆劃：{selectedKanji.strokes} 畫
                    </span>
                    <h3 class="text-xl font-bold text-slate-800 mt-2">{selectedKanji.meaning}</h3>
                    <p class="text-xs text-indigo-600 font-medium">難度分級：{selectedKanji.grade || selectedKanji.level || "N5"}</p>
                  </div>
                </div>

                <div class="space-y-3 bg-slate-50 p-4 rounded-xl mb-6">
                  <div>
                    <span class="text-xs font-semibold text-slate-400 block mb-1">音讀 (Onyomi)</span>
                    <div class="flex flex-wrap gap-1.5">
                      {selectedKanji.onyomi && selectedKanji.onyomi.length > 0 ? (
                        selectedKanji.onyomi.map(o => (
                          <span key={o} class="bg-indigo-600 text-white text-xs font-mono px-2 py-0.5 rounded">{o}</span>
                        ))
                      ) : <span class="text-xs text-slate-400">—</span>}
                    </div>
                  </div>
                  <div class="pt-2 border-t border-slate-200/60">
                    <span class="text-xs font-semibold text-slate-400 block mb-1">訓讀 (Kunyomi)</span>
                    <div class="flex flex-wrap gap-1.5">
                      {selectedKanji.kunyomi && selectedKanji.kunyomi.length > 0 ? (
                        selectedKanji.kunyomi.map(k => (
                          <span key={k} class="bg-emerald-600 text-white text-xs font-mono px-2 py-0.5 rounded">{k}</span>
                        ))
                      ) : <span class="text-xs text-slate-400">—</span>}
                    </div>
                  </div>
                </div>

                {selectedKanji.related_words && selectedKanji.related_words.length > 0 && (
                  <div>
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">相關詞彙聯動</h4>
                    <div class="flex flex-wrap gap-2">
                      {selectedKanji.related_words.map((rw, i) => (
                        <span key={i} class="bg-slate-100 border border-slate-200 text-slate-700 text-xs px-2.5 py-1 rounded-lg">
                          {rw}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
