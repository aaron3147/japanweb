<!-- Raw JSX source, kept inert as a non-executing script (raw-text element, no HTML entity
     decoding applied) so the browser never tries to auto-run or auto-inject it. We compile
     and execute it ourselves below, which avoids a known Babel-Standalone crash on some
     mobile browsers where its own automatic <script type="text/babel"> DOM injection fails
     with "Cannot read properties of null (reading 'appendChild')".
     Note: this app fetches its vocabulary/kana/grammar data from ./data/*.json at startup,
     so it must be served over http(s) (e.g. Netlify) — opening this file directly via

const { useState, useEffect, useMemo, useCallback } = React;


/* =========================================================================
   言の道 (Kotoba-dō) — 每日日語單字修行
   單檔 React 元件。使用 window.storage 做個人化持久化（每位使用者獨立）。
   單字／假名／文法資料庫從 ./data/*.json 於啟動時非同步載入，不寫死在程式碼
   裡；日後擴充字庫只需要編輯/新增 JSON 檔，不需要碰這份程式邏輯。
   ========================================================================= */

const CATEGORIES = [
  { id: "人物", label: "人物與稱謂" },
  { id: "時間", label: "時間" },
  { id: "食", label: "食（飲食）" },

  { id: "運動", label: "運動" },
  { id: "自然", label: "自然" },
  { id: "顏色", label: "顏色" },
  { id: "形容詞", label: "形容詞與感受" },
  { id: "動詞", label: "動詞" },
  { id: "招呼語", label: "招呼語與慣用句" },
  { id: "其他", label: "數字・副詞・其他" },

let WORDS = [];        // 由 loadAppData() 於啟動時非同步填入（見 App 元件）
let DICTIONARY = [];   // 例句中額外詞彙自動註解用的字典，隨 WORDS 一起建立

function glossExample(jpText, ownKanji, ownKana) {
  const found = [];
  const seen = new Set([ownKanji, ownKana]);
  let i = 0;
  while (i < jpText.length) {
    let matched = null;
    for (const entry of DICTIONARY) {
      if (entry.key.length === 0) continue;
      if (jpText.startsWith(entry.key, i)) { matched = entry; break; }
    }
    if (matched) {
      if (!seen.has(matched.key)) {
        seen.add(matched.key);
        found.push(matched);
      }
      i += matched.key.length;
    } else {
      i += 1;
    }
  }
  return found;
}

function buildWordsData(wordsJson, glossaryJson) {
  WORDS = wordsJson.map((w, i) => ({
    id: "w" + i,
    kanji: w.kanji, kana: w.kana, romaji: w.romaji, meaning: w.meaning, pos: w.pos, category: w.category,
    examples: w.examples.map(ex => ({ jp: ex.jp, reading: ex.reading, zh: ex.zh })),
  }));

  DICTIONARY = [
    ...WORDS.map(w => ({ key: w.kanji, reading: w.kana, meaning: w.meaning })),
    ...glossaryJson.map(g => ({ key: g.key, reading: g.reading, meaning: g.meaning })),
  ].sort((a, b) => b.key.length - a.key.length);

  WORDS.forEach(w => {
    w.examples.forEach(ex => {
      ex.gloss = glossExample(ex.jp, w.kanji, w.kana);
    });
  });
}

const DAY_MS = 86400000;
const BOX_INTERVALS = [0, 1, 2, 4, 7, 15, 30]; // days until next review, indexed by box level
const MISTAKE_CLEAR_STREAK = 3; // consecutive correct answers needed to clear a kana from the mistake list



/* --------------------------- 五十音資料庫（動態載入） -------------------------------- */
function mk(pairs) {
  return pairs.map(p => ({ kana: p.kana, romaji: p.romaji }));
}

let KANA_CATEGORIES = [];
let KANA_ALL = [];

function buildKanaData(kanaJson) {
  const hiraganaSeion = mk(kanaJson.hiraganaSeion);
  const katakanaSeion = mk(kanaJson.katakanaSeion);
  const hiraganaDakuon = mk(kanaJson.hiraganaDakuon);
  const katakanaDakuon = mk(kanaJson.katakanaDakuon);
  const hiraganaYouon = mk(kanaJson.hiraganaYouon);
  const katakanaYouon = mk(kanaJson.katakanaYouon);

  KANA_CATEGORIES = [
    { id: "hira-sei", label: "平假名・清音", short: "清音", script: "平假名", data: hiraganaSeion },
    { id: "hira-daku", label: "平假名・濁音", short: "濁音", script: "平假名", data: hiraganaDakuon },
    { id: "hira-you", label: "平假名・拗音", short: "拗音", script: "平假名", data: hiraganaYouon },
    { id: "kata-sei", label: "片假名・清音", short: "清音", script: "片假名", data: katakanaSeion },
    { id: "kata-daku", label: "片假名・濁音", short: "濁音", script: "片假名", data: katakanaDakuon },
    { id: "kata-you", label: "片假名・拗音", short: "拗音", script: "片假名", data: katakanaYouon },
  ];
  KANA_ALL = KANA_CATEGORIES.reduce((acc, c) => acc.concat(c.data), []);
}


/* ------------------- 傳統五十音圖表資料（含平假名字源漢字） ------------------- */

      youon: [gr("ひゃ","ヒャ","hya",""), gr("ひゅ","ヒュ","hyu",""), gr("ひょ","ヒョ","hyo","")] },

function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildKanaOptions(item, pool) {
  const distinctOthers = [];
  const seenRomaji = new Set([item.romaji]);
  for (const p of shuffleArr(pool)) {
    if (seenRomaji.has(p.romaji)) continue;
    seenRomaji.add(p.romaji);
    distinctOthers.push(p.romaji);
    if (distinctOthers.length >= 3) break;
  }
  const options = shuffleArr([item.romaji, ...distinctOthers]);
  return options;
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / DAY_MS);
}

/* ------------------------------- App ------------------------------------ */
function App() {
  const [ready, setReady] = useState(false);
  const [cards, setCards] = useState({});          // id -> {box, due, seen, correctStreak}
  const [dailyGoal, setDailyGoal] = useState(10);
  const [streak, setStreak] = useState(0);
  const [lastActiveDate, setLastActiveDate] = useState(null);
  const [learnerEmail, setLearnerEmail] = useState("");
  const [log, setLog] = useState({});              // date -> {learned, reviewed}
  const [view, setView] = useState("dashboard");    // dashboard | session | stats | done
  const [sessionQueue, setSessionQueue] = useState([]);
  const [sessionIdx, setSessionIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [sessionAnswers, setSessionAnswers] = useState([]); // parallel to sessionQueue: null | true | false
  const [sessionStats, setSessionStats] = useState({ correct: 0, total: 0, newCount: 0 });
  const [error, setError] = useState(null);
  const [dataError, setDataError] = useState(null);

  /* ---------- kana quiz state ---------- */
  const [kanaCategory, setKanaCategory] = useState(null); // one of KANA_CATEGORIES or comprehensive marker
  const [kanaQueue, setKanaQueue] = useState([]);
  const [kanaPool, setKanaPool] = useState([]);
  const [kanaIdx, setKanaIdx] = useState(0);
  const [kanaOptionsArr, setKanaOptionsArr] = useState([]); // per-index cached options
  const [kanaAnswersArr, setKanaAnswersArr] = useState([]); // per-index selected romaji or null
  const [kanaScore, setKanaScore] = useState(0);
  const [kanaWrong, setKanaWrong] = useState([]);
  const [kanaStats, setKanaStats] = useState({}); // kana -> {romaji, attempts, correct, wrong}

  /* ---------- load persisted state + app data (words/kana JSON) ---------- */
  useEffect(() => {
    (async () => {
      // app data lives in separate JSON files (./data/*.json) instead of being
      // baked into the compiled JS, so the app stays fast to compile/parse no
      // matter how large the vocab database grows, and updating vocabulary is
      // just a matter of editing/replacing a JSON file.
      try {
        const [wordsRes, glossaryRes, kanaRes] = await Promise.all([
          fetch("./data/words.json"),
          fetch("./data/glossary.json"),
          fetch("./data/kana.json"),
        ]);
        if (!wordsRes.ok || !glossaryRes.ok || !kanaRes.ok) {
          throw new Error("資料檔案下載失敗（HTTP 錯誤）");
        }
        const [wordsJson, glossaryJson, kanaJson] = await Promise.all([
          wordsRes.json(), glossaryRes.json(), kanaRes.json(),
        ]);
        buildWordsData(wordsJson, glossaryJson);
        buildKanaData(kanaJson);
      } catch (e) {
        setDataError(e && e.message ? e.message : String(e));
        return; // don't flip to ready — show the data-error screen instead
      }

      try {
        const [c, settings, l, ks] = await Promise.all([
          safeGet("srs-cards"),
          safeGet("settings"),
          safeGet("daily-log"),
          safeGet("kana-stats"),
        ]);
        if (c) setCards(JSON.parse(c.value));
        if (settings) {
          const s = JSON.parse(settings.value);
          setDailyGoal(s.dailyGoal ?? 10);
          setStreak(s.streak ?? 0);
          setLastActiveDate(s.lastActiveDate ?? null);
          setLearnerEmail(s.learnerEmail ?? "");
        }
        if (l) setLog(JSON.parse(l.value));
        if (ks) setKanaStats(JSON.parse(ks.value));
      } catch (e) {
        // no prior data — fresh start
      } finally {
        setReady(true);
      }
    })();
  }, []);

  async function safeGet(key) {
    try { return await window.storage.get(key, false); } catch { return null; }
  }
  async function persistCards(next) {
    setCards(next);
    try { await window.storage.set("srs-cards", JSON.stringify(next), false); } catch (e) { setError("儲存失敗，請稍後再試"); }
  }
  async function persistSettings(next) {
    try { await window.storage.set("settings", JSON.stringify(next), false); } catch (e) { setError("儲存失敗，請稍後再試"); }
  }
  async function persistLog(next) {
    setLog(next);
    try { await window.storage.set("daily-log", JSON.stringify(next), false); } catch (e) { setError("儲存失敗，請稍後再試"); }
  }
  async function persistKanaStats(next) {
    setKanaStats(next);
    try { await window.storage.set("kana-stats", JSON.stringify(next), false); } catch (e) { setError("儲存失敗，請稍後再試"); }
  }
  async function saveLearnerEmail(email) {
    setLearnerEmail(email);
    await persistSettings({ dailyGoal, streak, lastActiveDate, learnerEmail: email });
  }


  /* ---------- derived: due reviews + new words available today ---------- */
  const today = todayStr();
  const dueCards = useMemo(() => {
    return WORDS.filter(w => {
      const c = cards[w.id];
      return c && !c.mastered && c.due <= today;
    });
  }, [cards, today]);

  const unseenWords = useMemo(() => WORDS.filter(w => !cards[w.id]), [cards]);
  const masteredCount = useMemo(() => Object.values(cards).filter(c => c.box >= 6).length, [cards]);
  const learnedCount = Object.keys(cards).length;

  /* ---------- derived: kana mistakes + per-category overview ---------- */
  const kanaMistakeItems = useMemo(() => {
    return Object.entries(kanaStats)
      .filter(([, s]) => s.wrong > 0 && (s.streak || 0) < MISTAKE_CLEAR_STREAK)
      .sort((a, b) => b[1].wrong - a[1].wrong)
      .map(([kana, s]) => ({ kana, romaji: s.romaji, wrong: s.wrong, attempts: s.attempts, streak: s.streak || 0 }));
  }, [kanaStats]);

  const vocabWeak = useMemo(() => {
    return WORDS
      .filter(w => cards[w.id] && !cards[w.id].mastered)
      .sort((a, b) => (cards[a.id].box) - (cards[b.id].box))
      .map(w => ({ ...w, box: cards[w.id].box }));
  }, [cards]);

  const kanaAccuracy = useMemo(() => {
    const totals = Object.values(kanaStats).reduce((acc, s) => ({
      attempts: acc.attempts + s.attempts, correct: acc.correct + s.correct,
    }), { attempts: 0, correct: 0 });
    return totals.attempts > 0 ? Math.round((totals.correct / totals.attempts) * 100) : null;
  }, [kanaStats]);

  const kanaOverview = useMemo(() => {
    const perCategory = KANA_CATEGORIES.map(c => {
      let attempts = 0, correct = 0, wrong = 0, touched = 0;
      c.data.forEach(item => {
        const s = kanaStats[item.kana];
        if (s) {
          touched += 1;
          attempts += s.attempts;
          correct += s.correct;
          wrong += s.wrong;
        }
      });
      return { ...c, touched, total: c.data.length, attempts, correct, wrong };
    });
    const totals = perCategory.reduce((acc, c) => ({
      touched: acc.touched + c.touched,
      total: acc.total + c.total,
      attempts: acc.attempts + c.attempts,
      correct: acc.correct + c.correct,
      wrong: acc.wrong + c.wrong,
    }), { touched: 0, total: 0, attempts: 0, correct: 0, wrong: 0 });
    return { perCategory, totals };
  }, [kanaStats]);

  function buildSession() {
    // priority: due reviews first, then fill remaining slots with new words up to dailyGoal
    const due = dueCards.slice();
    const remainingSlots = Math.max(0, dailyGoal - 0); // reviews don't count against new-word cap; new words capped separately
    const newBatch = unseenWords.slice(0, dailyGoal);
    const queue = [...due, ...newBatch];
    if (queue.length === 0) return [];
    return queue;
  }

  function startSession() {
    const q = buildSession();
    if (q.length === 0) { setView("dashboard"); return; }
    setSessionQueue(q);
    setSessionIdx(0);
    setFlipped(false);
    setSessionAnswers(new Array(q.length).fill(null));
    setSessionStats({ correct: 0, total: 0, newCount: 0 });
    setView("session");
  }

  function startCategorySession(categoryId) {
    const catWords = WORDS.filter(w => w.category === categoryId);
    const due = catWords.filter(w => {
      const c = cards[w.id];
      return c && !c.mastered && c.due <= today;
    });
    const newOnes = catWords.filter(w => !cards[w.id]);
    const q = [...due, ...newOnes];
    if (q.length === 0) return;
    setSessionQueue(q);
    setSessionIdx(0);
    setFlipped(false);
    setSessionAnswers(new Array(q.length).fill(null));
    setSessionStats({ correct: 0, total: 0, newCount: 0 });
    setView("session");
  }

  async function answerCard(known) {
    if (sessionAnswers[sessionIdx] !== null && sessionAnswers[sessionIdx] !== undefined) return; // already graded, don't re-grade
    const word = sessionQueue[sessionIdx];
    const prev = cards[word.id];
    const isNew = !prev;
    let box = prev ? prev.box : 0;
    box = known ? Math.min(box + 1, 6) : Math.max(box - 1, 1);
    const due = new Date(Date.now() + BOX_INTERVALS[box] * DAY_MS);
    const nextCards = {
      ...cards,
      [word.id]: {
        box,
        due: due.getFullYear() + "-" + String(due.getMonth() + 1).padStart(2, "0") + "-" + String(due.getDate()).padStart(2, "0"),
        lastReview: today,
        mastered: box >= 6,
      },
    };
    await persistCards(nextCards);

    const nextLog = { ...log };
    const entry = nextLog[today] || { learned: 0, reviewed: 0 };
    if (isNew) entry.learned += 1; else entry.reviewed += 1;
    nextLog[today] = entry;
    await persistLog(nextLog);

    setSessionStats(s => ({
      correct: s.correct + (known ? 1 : 0),
      total: s.total + 1,
      newCount: s.newCount + (isNew ? 1 : 0),
    }));

    setSessionAnswers(arr => {
      const next = arr.slice();
      next[sessionIdx] = known;
      return next;
    });

    // count today as "active" for the streak as soon as at least one card is graded,
    // so progress isn't lost if the person exits before finishing the whole session.
    if (lastActiveDate !== today) {
      const newStreak = lastActiveDate === yesterdayStr() ? streak + 1 : 1;
      setStreak(newStreak);
      setLastActiveDate(today);
      await persistSettings({ dailyGoal, streak: newStreak, lastActiveDate: today, learnerEmail });
    }
  }

  function prevCard() {
    if (sessionIdx === 0) return;
    const newIdx = sessionIdx - 1;
    setSessionIdx(newIdx);
    setFlipped(sessionAnswers[newIdx] !== null && sessionAnswers[newIdx] !== undefined);
  }

  function advanceSession() {
    if (sessionIdx + 1 >= sessionQueue.length) {
      setView("done");
    } else {
      const newIdx = sessionIdx + 1;
      setSessionIdx(newIdx);
      setFlipped(sessionAnswers[newIdx] !== null && sessionAnswers[newIdx] !== undefined);
    }
  }

  function endSession() {
    // exits early; anything already graded is already persisted, so nothing is lost
    setView("dashboard");
  }

  function yesterdayStr() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  async function changeGoal(n) {
    setDailyGoal(n);
    await persistSettings({ dailyGoal: n, streak, lastActiveDate, learnerEmail });
  }

  /* ---------- kana quiz handlers ---------- */
  function startKanaQuiz(category, distractorPool) {
    const pool = distractorPool || category.data;
    const queue = shuffleArr(category.data);
    setKanaCategory(category);
    setKanaPool(pool);
    setKanaQueue(queue);
    setKanaIdx(0);
    const opts = new Array(queue.length).fill(null);
    opts[0] = buildKanaOptions(queue[0], pool);
    setKanaOptionsArr(opts);
    setKanaAnswersArr(new Array(queue.length).fill(null));
    setKanaScore(0);
    setKanaWrong([]);
    setView("kana-quiz");
  }

  function startMistakeQuiz() {
    if (kanaMistakeItems.length === 0) return;
    startKanaQuiz(
      { id: "mistakes", label: "常錯字練習", short: "常錯字", script: "錯題本", data: kanaMistakeItems },
      KANA_ALL
    );
  }

  function answerKana(choice) {
    if (kanaAnswersArr[kanaIdx] !== null && kanaAnswersArr[kanaIdx] !== undefined) return; // already answered
    const current = kanaQueue[kanaIdx];
    const correct = choice === current.romaji;
    setKanaAnswersArr(arr => {
      const next = arr.slice();
      next[kanaIdx] = choice;
      return next;
    });
    if (correct) {
      setKanaScore(s => s + 1);
    } else {
      setKanaWrong(w => [...w, current]);
    }

    const prevStat = kanaStats[current.kana] || { romaji: current.romaji, attempts: 0, correct: 0, wrong: 0, streak: 0 };
    const nextStats = {
      ...kanaStats,
      [current.kana]: {
        romaji: current.romaji,
        attempts: prevStat.attempts + 1,
        correct: prevStat.correct + (correct ? 1 : 0),
        wrong: prevStat.wrong + (correct ? 0 : 1),
        // consecutive correct answers since the last mistake; 3 in a row clears it from
        // the "常錯字" list, a fresh mistake resets the streak and re-flags it
        streak: correct ? (prevStat.streak || 0) + 1 : 0,
      },
    };
    persistKanaStats(nextStats);
  }

  function goToKana(newIdx) {
    setKanaOptionsArr(arr => {
      if (arr[newIdx]) return arr;
      const next = arr.slice();
      next[newIdx] = buildKanaOptions(kanaQueue[newIdx], kanaPool);
      return next;
    });
    setKanaIdx(newIdx);
  }

  function prevKana() {
    if (kanaIdx === 0) return;
    goToKana(kanaIdx - 1);
  }

  function nextKana() {
    const nextIdx = kanaIdx + 1;
    if (nextIdx >= kanaQueue.length) {
      setView("kana-result");
      return;
    }
    goToKana(nextIdx);
  }

  function endKanaQuiz() {
    // shows results for whatever was answered so far, rest is simply dropped
    setView("kana-result");
  }

  if (dataError) {
    return (
      <div style={styles.loadingScreen}>
        <FontLoader />
        <div style={{ ...styles.seal, borderColor: "#BC4A3C", color: "#BC4A3C" }}>！</div>
        <p style={{ fontFamily: "'Noto Sans TC', sans-serif", color: "#F5F0E6", marginTop: 16, letterSpacing: 1, textAlign: "center", padding: "0 24px" }}>
          單字資料載入失敗，請確認 <code>data</code> 資料夾（words.json／glossary.json／kana.json）
          有跟 index.html 一起部署在同一層。
        </p>
        <p style={{ fontFamily: "monospace", color: "#F5F0E699", marginTop: 8, fontSize: 12, textAlign: "center", padding: "0 24px" }}>
          {dataError}
        </p>
      </div>
    );
  }

  if (!ready) {
    return (
      <div style={styles.loadingScreen}>
        <FontLoader />
        <div style={styles.seal}>言</div>
        <p style={{ fontFamily: "'Noto Sans TC', sans-serif", color: "#F5F0E6", marginTop: 16, letterSpacing: 1 }}>載入中…</p>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <FontLoader />
      <Header streak={streak} view={view} setView={setView} />
      {error && <div style={styles.errorBanner}>{error}</div>}
      <main style={styles.main} className="km-main">
        {view === "dashboard" && (
          <Dashboard
            dailyGoal={dailyGoal}
            changeGoal={changeGoal}
            dueCount={dueCards.length}
            newAvailable={Math.min(dailyGoal, unseenWords.length)}
            learnedCount={learnedCount}
            masteredCount={masteredCount}
            totalWords={WORDS.length}
            startSession={startSession}
            onPracticeCategory={startCategorySession}
            streak={streak}
            cards={cards}
          />
        )}
        {view === "session" && sessionQueue[sessionIdx] && (
          <SessionView
            word={sessionQueue[sessionIdx]}
            index={sessionIdx}
            total={sessionQueue.length}
            flipped={flipped}
            setFlipped={setFlipped}
            onAnswer={answerCard}
            isNew={!cards[sessionQueue[sessionIdx].id]}
            answerChoice={sessionAnswers[sessionIdx]}
            onPrev={prevCard}
            onNext={advanceSession}
            canGoPrev={sessionIdx > 0}
            onQuit={endSession}
          />
        )}
        {view === "done" && (
          <DoneView stats={sessionStats} streak={streak} onBack={() => setView("dashboard")} />
        )}
        {view === "stats" && (
          <StatsView
            log={log}
            learnedCount={learnedCount}
            masteredCount={masteredCount}
            totalWords={WORDS.length}
            streak={streak}
            learnerEmail={learnerEmail}
            onSaveEmail={saveLearnerEmail}
            vocabWeak={vocabWeak}
            kanaMistakeItems={kanaMistakeItems}
            kanaAccuracy={kanaAccuracy}
          />
        )}
        {view === "kana-menu" && (
          <KanaMenu
            onStart={c => startKanaQuiz(c)}
            onOverview={() => setView("kana-overview")}
            onMistakes={startMistakeQuiz}
            mistakeCount={kanaMistakeItems.length}
          />
        )}
        {view === "kana-overview" && (
          <KanaOverviewView overview={kanaOverview} kanaStats={kanaStats} onBack={() => setView("kana-menu")} />
        )}
        {view === "kana-quiz" && kanaQueue[kanaIdx] && (
          <KanaQuizView
            category={kanaCategory}
            item={kanaQueue[kanaIdx]}
            index={kanaIdx}
            total={kanaQueue.length}
            options={kanaOptionsArr[kanaIdx] || []}
            selected={kanaAnswersArr[kanaIdx]}
            score={kanaScore}
            onAnswer={answerKana}
            onNext={nextKana}
            onPrev={prevKana}
            canGoPrev={kanaIdx > 0}
            onQuit={endKanaQuiz}
          />
        )}
        {view === "kana-result" && (
          <KanaResultView
            category={kanaCategory}
            score={kanaScore}
            total={kanaAnswersArr.filter(a => a !== null && a !== undefined).length}
            wrong={kanaWrong}
            onRetry={() => startKanaQuiz(kanaCategory, kanaCategory.id === "mistakes" ? KANA_ALL : undefined)}
            onBack={() => setView("kana-menu")}
          />
        )}
      </main>
    </div>
  );
}

function Dashboard({ dailyGoal, changeGoal, dueCount, newAvailable, learnedCount, masteredCount, totalWords, startSession, onPracticeCategory, streak, cards }) {

  const progressPct = Math.min(100, Math.round((masteredCount / totalWords) * 100));
  const [expanded, setExpanded] = useState(null);

  const grouped = useMemo(() => {
    const map = {};
    CATEGORIES.forEach(c => { map[c.id] = []; });
    WORDS.forEach(w => {
      if (!map[w.category]) map[w.category] = [];
      map[w.category].push(w);
    });
    return map;
  }, []);

  return (
    <div style={styles.dashboardWrap}>
      <section style={styles.heroCard}>
        <div style={styles.sealLarge}>本</div>
        <div style={{ flex: 1 }}>
          <div style={styles.heroLabel}>今日課題 · TODAY'S SESSION</div>
          <div style={styles.heroCount}>{totalToday} <span style={styles.heroCountUnit}>個單字</span></div>
          <div style={styles.heroBreakdown}>
            {dueCount > 0 && <span>複習 {dueCount} 個　</span>}
            {newAvailable > 0 && <span>新單字 {newAvailable} 個</span>}
            {totalToday === 0 && <span>今日份已全部完成，明天再來！</span>}
          </div>
          <button
            style={{ ...styles.ctaButton, opacity: totalToday === 0 ? 0.45 : 1, cursor: totalToday === 0 ? "default" : "pointer" }}
            onClick={totalToday > 0 ? startSession : undefined}
            disabled={totalToday === 0}
          >
            {totalToday === 0 ? "今日已完成" : "開始修行"}
          </button>
        </div>
      </section>

      <section style={styles.goalCard}>
        <div style={styles.sectionLabel}>每日新單字量</div>
        <div style={styles.goalOptions}>
          {[5, 10, 15].map(n => (
            <button key={n} onClick={() => changeGoal(n)} style={goalBtn(dailyGoal === n)}>
              {n} 個
            </button>
          ))}
        </div>
        <p style={styles.goalNote}>依 N5 常用詞彙庫排序自動出題，並以間隔重複複習已學單字。</p>
      </section>

      <section style={styles.statGrid}>
        <StatTile label="已學單字" value={learnedCount} unit={`/ ${totalWords}`} />
        <StatTile label="已精通" value={masteredCount} unit="個" />
        <StatTile label="連續天數" value={streak} unit="天" />
      </section>

      <section style={styles.progressSection}>
        <div style={styles.sectionLabel}>N5 詞彙庫進度</div>
        <div style={styles.progressTrack}>
          <div style={{ ...styles.progressFill, width: progressPct + "%" }} />
        </div>
        <div style={styles.progressPct}>{progressPct}%</div>
      </section>

      <section style={styles.wordListSection}>
        <div style={styles.sectionLabel}>單字表 · 依主題分類（點分類展開，每個字顯示熟練度 0～6）</div>
        <div style={styles.legendRow}>
          <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#1F3A5F22" }} />尚未學過</span>
          <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#C9A227" }} />學習中</span>
          <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#6B8F71" }} />已精通</span>
        </div>
        <div style={styles.overviewList}>
          {CATEGORIES.map(c => {
            const words = grouped[c.id] || [];
            if (words.length === 0) return null;
            const isOpen = expanded === c.id;
            const masteredInCat = words.filter(w => cards[w.id] && cards[w.id].mastered).length;
            return (
              <div key={c.id} style={styles.vocabCategoryBlock}>
                <button style={styles.vocabCategoryHead} onClick={() => setExpanded(isOpen ? null : c.id)}>
                  <span style={styles.vocabCategoryLabel}>{c.label}</span>
                  <span style={styles.vocabCategoryMeta}>
                    {words.length} 字　·　已精通 {masteredInCat}　{isOpen ? "▲" : "▼"}
                  </span>
                </button>
                <div style={styles.vocabCategoryActions}>
                  <button style={styles.vocabCategoryPracticeBtn} onClick={() => onPracticeCategory(c.id)}>
                    測驗這個分類
                  </button>
                </div>
                {isOpen && (
                  <div style={styles.vocabWordGrid} className="km-vocab-word-grid">
                    {words.map(w => {
                      const stat = cards[w.id];
                      const box = stat ? stat.box : 0;
                      return (
                        <div key={w.id} style={{ ...styles.vocabWordCell, ...vocabCellStyle(box) }}>
                          <div style={styles.vocabWordMain}>
                            <div style={styles.vocabWordKanji}>{w.kanji}</div>
                            <div style={styles.vocabWordKana}>{w.kana}</div>
                          </div>
                          <div style={styles.vocabWordSide}>
                            <div style={styles.vocabWordMeaning}>{w.meaning}</div>
                            <div style={styles.vocabWordBox}>{box}/6</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </section>
    </div>
  );
}

  return {};
}

function DoneView({ stats, streak, onBack }) {

    <div style={styles.doneWrap}>
      <div style={styles.sealLarge}>完</div>
      <h2 style={styles.doneTitle}>本日修行完成</h2>
      <p style={styles.doneSub}>學了 {stats.newCount} 個新單字，複習了 {stats.total - stats.newCount} 個舊單字</p>

        <StatTile label="答對率" value={acc} unit="%" />

      </div>
      <button style={styles.ctaButton} onClick={onBack}>回到首頁</button>

function StatsView({
  log, learnedCount, masteredCount, totalWords, streak,
  learnerEmail, onSaveEmail, vocabWeak, kanaMistakeItems,
  kanaAccuracy,
}) {
  const days = useMemo(() => {
    const arr = [];
    for (let i = 27; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      const entry = log[key];
      const count = entry ? entry.learned + entry.reviewed : 0;
      arr.push({ key, count });
    }
    return arr;
  }, [log]);
  const maxCount = Math.max(1, ...days.map(d => d.count));

  return (
    <div style={styles.statsWrap}>
      <EmailLabel learnerEmail={learnerEmail} onSaveEmail={onSaveEmail} />

      <section style={styles.statGrid}>
        <StatTile label="已學單字" value={learnedCount} unit={`/ ${totalWords}`} />
        <StatTile label="已精通" value={masteredCount} unit="個" />
        <StatTile label="連續天數" value={streak} unit="天" />
      </section>
      <section style={styles.heatmapSection}>
        <div style={styles.sectionLabel}>近 28 日學習狀況</div>
        <div style={styles.heatmapGrid}>
          {days.map(d => (
            <div
              key={d.key}
              title={`${d.key}：${d.count} 個`}
              style={{
                ...styles.heatCell,
                background: d.count === 0 ? "#1F3A5F0D" : `rgba(188,74,60,${0.2 + 0.8 * (d.count / maxCount)})`,
              }}
            />
          ))}
        </div>
      </section>
      {learnedCount === 0 && (
        <p style={styles.emptyNote}>還沒有學習紀錄，回到「今日」開始你的第一次修行吧。</p>
      )}

      <WeakPointSection vocabWeak={vocabWeak} kanaMistakeItems={kanaMistakeItems} kanaAccuracy={kanaAccuracy} />
    </div>
  );
}

  const [editing, setEditing] = useState(!learnerEmail);

    return (
      <div style={styles.emailBar}>
        <span style={styles.emailBarText}>{learnerEmail} 的學習歷程</span>
        <button style={styles.emailEditBtn} onClick={() => setEditing(true)}>更換</button>
      </div>
    );
  }

  return (
    <div style={styles.emailBar}>
      <input
        type="email"
        placeholder="輸入 email 幫這份紀錄加上標籤"
        value={draft}
        onChange={e => setDraft(e.target.value)}
        style={styles.emailInput}
      />
      <button style={styles.emailEditBtn} onClick={handleSave}>儲存</button>

function KanaOverviewView({ overview, kanaStats, onBack }) {
  const { totals } = overview;
  const totalAcc = totals.attempts > 0 ? Math.round((totals.correct / totals.attempts) * 100) : null;

  function statusOf(kana) {
    if (!kana) return "blank";
    const s = kanaStats[kana];
    if (!s) return "neutral";
    if (s.wrong > 0 && (s.streak || 0) < MISTAKE_CLEAR_STREAK) return "mistake";
    return "ok";
  }

  return (
    <div style={styles.kanaMenuWrap}>
      <section style={styles.heroCard}>
        <div style={styles.sealLarge}>總</div>
        <div style={{ flex: 1 }}>
          <div style={styles.heroLabel}>五十音總覽 · 傳統字表</div>
          <div style={{ ...styles.heroCount, fontSize: 30 }}>
            {totals.touched} <span style={styles.heroCountUnit}>/ {totals.total} 字已練過</span>
          </div>
          <div style={styles.heroBreakdown}>
            {totalAcc === null ? "還沒有作答紀錄" : `整體正確率 ${totalAcc}%　· 共答題 ${totals.attempts} 次`}
          </div>
        </div>
      </section>

      <div style={styles.legendRow}>
        <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#6B8F71" }} />穩定</span>
        <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#BC4A3C" }} />常錯</span>
        <span style={styles.legendItem}><span style={{ ...styles.legendDot, background: "#1F3A5F22" }} />尚未練習</span>
      </div>

      <p style={styles.gojuonHint}>左右滑動可看完整表格；每格上方標羅馬字／片假名／字源漢字，下方是平假名本字。</p>

      <div style={styles.gojuonWrap}>
        <div style={styles.gojuonTable}>
          {GOJUON_ROWS.map(group => (
            <React.Fragment key={group.label}>
              {group.subrows.map((sub, si) => (
                <div key={group.label + si} style={styles.gojuonRow}>
                  <div style={styles.gojuonRowLabel}>
                    {si === 0 && group.label.split("").map((ch, i) => <div key={i}>{ch}</div>)}
                  </div>
                  {sub.cells.map((c, ci) => (
                    <React.Fragment key={ci}>
                      <GojuonCell cell={c} status={statusOf(c.kana)} big={!sub.single} />
                      {sub.youon && ci === 1 && (
                        <div style={styles.gojuonYouonGroup}>
                          {sub.youon.map((yc, yi) => (
                            <GojuonCell key={yi} cell={yc} status={statusOf(yc.kana)} small />
                          ))}
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              ))}
            </React.Fragment>
          ))}
        </div>
      </div>

      <button style={{ ...styles.answerBtn, ...styles.answerBtnNo, maxWidth: 420 }} onClick={onBack}>返回假名選單</button>
    </div>
  );
}

function GojuonCell({ cell, status, small }) {
  const cellClass = "km-gojuon-cell " + (small ? "km-gojuon-cell-sm" : "km-gojuon-cell-lg");
  if (!cell.kana) {
    return <div style={{ ...styles.gojuonCell, width: small ? 76 : 70 }} className={cellClass} />;
  }
  const statusBg =
    status === "ok" ? "#6B8F711A" :
    status === "mistake" ? "#BC4A3C14" : "transparent";
  return (
    <div style={{ ...styles.gojuonCell, width: small ? 76 : 70, background: statusBg }} className={cellClass}>
      <div style={styles.gojuonCellStack} className="km-gojuon-stack">
        <div style={styles.gojuonRomaji} className="km-gojuon-romaji">{cell.romaji}</div>
        <div style={styles.gojuonKata} className="km-gojuon-kata">{cell.kata}</div>
        {cell.origin && <div style={styles.gojuonOrigin} className="km-gojuon-origin">{cell.origin}</div>}
      </div>
      <div style={{ ...styles.gojuonBig, fontSize: small ? 18 : 30 }} className="km-gojuon-big">{cell.kana}</div>
    </div>
  );
}

function KanaQuizView({ category, item, index, total, options, selected, score, onAnswer, onNext, onPrev, canGoPrev, onQuit }) {
  const answered = selected !== null && selected !== undefined;
  return (
    <div style={styles.sessionWrap}>
      <div style={styles.sessionProgress}>
        <div style={styles.sessionProgressTrack}>
          <div style={{ ...styles.sessionProgressFill, width: `${(index / total) * 100}%` }} />
        </div>
        <div style={styles.sessionNavRow}>
          <button style={{ ...styles.navArrowBtn, opacity: canGoPrev ? 1 : 0.3 }} onClick={onPrev} disabled={!canGoPrev}>
            ← 上一個
          </button>
          <div style={styles.sessionProgressText}>{category.label}　{index + 1} / {total}　· 答對 {score}</div>
          <button style={styles.quitBtn} onClick={onQuit}>結束</button>
        </div>
      </div>

      <div style={styles.kanaBigCard}>
        <div style={styles.kanaBigChar}>{item.kana}</div>
      </div>

      <div style={styles.kanaOptionsGrid}>
        {options.map(opt => {
          let bg = styles.kanaOptionBtn;
          if (answered) {
            if (opt === item.romaji) bg = { ...styles.kanaOptionBtn, ...styles.kanaOptionCorrect };
            else if (opt === selected) bg = { ...styles.kanaOptionBtn, ...styles.kanaOptionWrong };
            else bg = { ...styles.kanaOptionBtn, opacity: 0.5 };
          }
          return (
            <button key={opt} style={bg} onClick={() => onAnswer(opt)} disabled={answered}>
              {opt}
            </button>
          );
        })}
      </div>

      {answered && (
        <button style={styles.ctaButton} onClick={onNext}>
          {index + 1 >= total ? "查看結果" : "下一題"}
        </button>
      )}
    </div>
  );
}

function KanaResultView({ category, score, total, wrong, onRetry, onBack }) {
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  return (
    <div style={styles.doneWrap}>

function FontLoader() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
      * { box-sizing: border-box; }

      /* responsive content width: inline styles used to hardcode a 560px cap
         everywhere, which made the whole app look phone-only even on tablets
         and desktop browsers. Real media queries here take over that job
         instead (max-width set via className, not inline style). */
      .km-main { max-width: 560px; margin: 0 auto; }
      @media (min-width: 720px) {
        .km-main { max-width: 720px; }
      }
      @media (min-width: 1024px) {
        .km-main { max-width: 960px; }
      }
      @media (min-width: 1400px) {
        .km-main { max-width: 1120px; }
      }

      /* let a few grids use the extra room on wider screens */
      @media (min-width: 720px) {
        .km-vocab-word-grid { display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .km-kana-grid { grid-template-columns: repeat(4, 1fr) !important; }
      }
      @media (min-width: 1024px) {
        .km-vocab-word-grid { grid-template-columns: repeat(3, 1fr); }
        .km-kana-grid { grid-template-columns: repeat(6, 1fr) !important; }
      }

      /* the gojuon reference table uses fixed pixel cells so it stays legible
         at any width; on roomier screens we scale those cells up instead of
         just leaving extra blank space around a phone-sized table */
      @media (min-width: 1024px) {
        .km-gojuon-cell-lg { width: 96px !important; }
        .km-gojuon-cell-sm { width: 100px !important; }
        .km-gojuon-stack { width: 32px !important; }
        .km-gojuon-big { font-size: 40px !important; }
        .km-gojuon-cell-sm .km-gojuon-big { font-size: 26px !important; }
        .km-gojuon-romaji { font-size: 12px !important; }
        .km-gojuon-kata { font-size: 13px !important; }
        .km-gojuon-origin { font-size: 12px !important; }
      }
    `}</style>
  );
}

<script>
// Local-storage backed shim of the Claude-artifact `window.storage` API,
// so the app persists progress in a normal browser / Netlify deployment.
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem((shared ? "shared:" : "priv:") + key);
      if (raw === null) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem((shared ? "shared:" : "priv:") + key, value);
      return { key, value, shared: !!shared };
    } catch (e) { return null; }
  },
  async delete(key, shared) {
    try {
      localStorage.removeItem((shared ? "shared:" : "priv:") + key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) { return null; }
  },
  async list(prefix, shared) {
    try {
      const p = (shared ? "shared:" : "priv:") + (prefix || "");
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith(p)) keys.push(k.slice((shared ? "shared:" : "priv:").length));
      }
      return { keys, prefix, shared: !!shared };
    } catch (e) { return null; }
  },
};

function showBootError(label, err) {
  var box = document.getElementById("boot-error");
  var status = document.getElementById("boot-status");
  if (status) status.style.display = "none";
  box.style.display = "block";
  var msg = (err && err.message) ? err.message : String(err);
  var stack = (err && err.stack) ? err.stack : "";
  box.textContent = label + "\n" + msg + (stack ? "\n\n" + stack : "");
}

window.addEventListener("error", function (e) {
  showBootError("執行時發生錯誤：", e.error || e.message);
});

(function () {
  var compiled;
  try {
    var sourceEl = document.getElementById("app-source");
    var jsxSource = sourceEl.textContent;
    compiled = Babel.transform(jsxSource, {
      presets: [["react", { runtime: "classic" }]],
      filename: "app.jsx",
    }).code;
  } catch (compileErr) {
    showBootError("JSX 編譯失敗：", compileErr);
    return;
  }

  var ran = false;
  var lastErr = null;

  try {
    (0, eval)(compiled);
    ran = true;
  } catch (e1) {
    lastErr = e1;
  }

  if (!ran) {
    try {
      var scriptEl = document.createElement("script");
      scriptEl.textContent = compiled;
      document.body.appendChild(scriptEl);
      ran = true;
    } catch (e2) {
      lastErr = e2;
    }
  }

  if (!ran) {
    showBootError(
      "無法執行編譯後的程式。如果你是在 Claude 的檔案預覽視窗看到這個訊息，" +
      "那個預覽環境本身會封鎖 eval / 動態腳本，跟實際部署到 Netlify 後的行為不同，" +
      "請改成打開實際部署後的網址測試。若在 Netlify 網址上仍出現這個訊息，錯誤內容如下：",
      lastErr
    );
    return;
  }

  var status = document.getElementById("boot-status");
  if (status) status.style.display = "none";
})();
</script>
